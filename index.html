<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>입고 예약 보드</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>입고 예약 보드</h1>
        <p id="dateLabel" class="date-label"></p>
      </div>
      <button id="refreshBtn" class="icon-btn" title="새로고침" aria-label="새로고침">↻</button>
    </header>

    <section class="tabs" aria-label="날짜 선택">
      <button id="todayBtn" class="tab active" data-day="today">오늘</button>
      <button id="tomorrowBtn" class="tab" data-day="tomorrow">내일</button>
    </section>

    <section class="toolbar">
      <input id="searchInput" type="search" placeholder="고객사, 발주번호 검색" autocomplete="off" />
    </section>

    <section class="summary" aria-label="입고 현황">
      <button class="summary-card active" data-filter="all" type="button"><span>전체</span><strong id="totalCount">0건</strong></button>
      <button class="summary-card done" data-filter="done" type="button"><span>완료</span><strong id="doneCount">0건</strong></button>
      <button class="summary-card wait" data-filter="notDone" type="button"><span>미입고</span><strong id="notDoneCount">0건</strong></button>
      <button class="summary-card pending" data-filter="pending" type="button"><span>승인대기</span><strong id="pendingCount">0건</strong></button>
    </section>

    <section id="floorList" class="floor-list"></section>
    <div id="emptyState" class="empty-state" hidden>조회된 입고예약이 없습니다.</div>
    <div id="errorState" class="error-state" hidden></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
